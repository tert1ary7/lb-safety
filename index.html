<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civic Incident Tracker</title>
<style>
  body { background-color: #1a1a1a; color: #f0f0f0; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .sign-container { border: 8px solid #ffca28; padding: 40px; background-color: #2c2c2c; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 700px; border-radius: 4px; }
  .header { font-size: 2.8em; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; color: #ffca28; letter-spacing: 2px; }
  .sub-header { font-size: 1.2em; font-weight: 600; text-transform: uppercase; color: #ccc; margin-bottom: 20px;}
  .number-display { font-size: 10em; color: #e53935; background: #111; padding: 10px 40px; border-radius: 8px; margin: 20px 0; font-weight: bold; font-family: monospace; border: 2px inset #333; line-height: 1; }
  .footer { font-size: 1em; color: #888; margin-top: 20px;}
  .disclaimer { font-size: 0.8em; color: #555; margin-top: 15px; }
</style>
</head>
<body>
  <div class="sign-container">
    <div class="header">DAYS SINCE LAST</div>
    <div class="sub-header">Shooting • Stabbing • Traffic Fatality</div>
    
    <div class="number-display" id="days-counter">0</div>
    
    <div class="footer" id="last-incident">Loading...</div>
    <div class="disclaimer">Data aggregated from LBPD Public Blotter. Subject to institutional reporting biases.</div>
  </div>

  <script>
    // System logic: Hardcoded to the latest LBPD blotter data (April 13, 2026 - Stabbing)
    const lastIncidentDate = new Date("2026-04-13T00:00:00"); 
    
    function updateCounter() {
      const now = new Date();
      const diffTime = Math.abs(now - lastIncidentDate);
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)); 
      
      document.getElementById("days-counter").innerText = diffDays;
      document.getElementById("last-incident").innerText = 
        `Last recorded incident: ${lastIncidentDate.toDateString()}`;
    }

    updateCounter();
    setInterval(updateCounter, 1000 * 60 * 60); // Refresh hourly
  </script>
</body>
</html>
