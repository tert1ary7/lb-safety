name: Autonomous Civic Tracker Update

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This confirms the job has write access

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Upgraded to v4 to fix Node warning
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Explicit token use

      - name: Initialize Python Environment
        uses: actions/setup-python@v5 # Upgraded to v5 to fix Node warning
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Scraper
        run: python scraper.py

      - name: Commit and Deploy Changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          # Only commit if there are actually changes to avoid 128 errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated state update" && git push)
