name: Autonomous Civic Tracker Update

on:
  schedule:
    - cron: '0 12 * * *' # Executes daily at 12:00 PM UTC (5:00 AM PDT)
  workflow_dispatch: # Allows you to trigger the script manually

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Initialize Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Scraper
        run: python scraper.py

      - name: Commit and Deploy Changes
        run: |
          git config --global user.name 'Automated Tracker'
          git config --global user.email 'bot@users.noreply.github.com'
          git add index.html
          git commit -m "Automated state update" || exit 0
          git push
