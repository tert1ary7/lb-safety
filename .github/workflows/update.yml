name: Autonomous Civic Tracker Update

on:
  schedule:
    - cron: '0 12 * * *' 
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false # We will handle credentials manually for reliability

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          
          # Check if there are changes; if not, exit gracefully
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
            exit 0
          fi
          
          git commit -m "Automated state update"
          
          # Direct push using the GITHUB_TOKEN for bypass
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
